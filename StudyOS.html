function useTweaks(defaults) {
  const [values, setValues] = useState(defaults);
  const setTweak = React.useCallback((keyOrObj, val) => {
    const edits = typeof keyOrObj === 'object' ? keyOrObj : { [keyOrObj]: val };
    setValues(prev => ({ ...prev, ...edits }));
    try { window.parent.postMessage({ type:'__edit_mode_set_keys', edits }, '*'); } catch(e){}
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title='Tweaks', children }) {
  const [open, setOpen] = useState(false);
  useEffect(() => {
    const h = e => {
      if (e.data?.type==='__activate_edit_mode')   setOpen(true);
      if (e.data?.type==='__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', h);
    try { window.parent.postMessage({type:'__edit_mode_available'},'*'); } catch(e){}
    return () => window.removeEventListener('message', h);
  }, []);
  if (!open) return null;
  return (
    <div className="twk-panel">
      <div className="twk-hd"><b>{title}</b><button className="twk-x" onClick={()=>{ setOpen(false); try{window.parent.postMessage({type:'__edit_mode_dismissed'},'*');}catch(e){} }}>✕</button></div>
      <div className="twk-body">{children}</div>
    </div>
  );
}
function TweakToggle({ label, value, onChange }) {
  return <div className="twk-row"><span className="twk-lbl">{label}</span><button className="twk-toggle" data-on={value?'1':'0'} onClick={()=>onChange(!value)}><i></i></button></div>;
}

// Hier werden NUR die Chart-internen SVG-Farben definiert.
// Alles was vom App-Theme kommt (Hintergrund, Border) steckt in StudyRadar.
const radarDarkTheme = {
  ringStroke:        'rgba(255,255,255,0.09)',

  dataFill:          'rgba(200,40,70,0.28)',

  centerLabelSub:    'rgba(255,255,255,0.38)',
  centerLabelMain:   '#ffffff',
};

const radarLightTheme = {
  ringStroke:        'rgba(0,0,0,0.09)',
  ringFill:          'rgba(0,0,0,0.02)',
  spoke:             'rgba(0,0,0,0.08)',

  labelDim:          '#b1b2b7',
  centerFill:        '#ebebed',
  centerStroke:      'rgba(0,0,0,0.07)',
  centerLabelSub:    'rgba(0,0,0,0.38)',
  centerLabelMain:   '#1a1815',
};

const RadarChart = ({ axes, size = 460, profileName = 'Balanced', theme = radarDarkTheme }) => {
  const cx = size / 2, cy = size / 2, R = size * 0.355, n = axes.length, rings = 5;
  const ang  = i => (2 * Math.PI * i) / n - Math.PI / 2;
  const tip  = (i, r) => [cx + r * Math.cos(ang(i)), cy + r * Math.sin(ang(i))];
  const poly = r => axes.map((_, i) => { const [x,y] = tip(i,r); return `${i?'L':'M'}${x},${y}`; }).join('') + 'Z';
  const data = axes.map((a, i) => { const [x,y] = tip(i, a.value * R); return `${i?'L':'M'}${x},${y}`; }).join('') + 'Z';
  const maxV = Math.max(...axes.map(a => a.value));

  return (
    <svg width={size} height={size} style={{ display:'block' }}>
      <defs>
        <radialGradient id="rCg">
          <stop offset="0%"   stopColor={theme.centerFill}/>
          <stop offset="100%" stopColor={theme.centerFill}/>
        </radialGradient>
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      {/* Concentric rings */}
      {[...Array(rings)].map((_, i) => (
        <path key={i} d={poly(R * (i + 1) / rings)}
          fill={i % 2 === 0 ? theme.ringFill : 'none'}
          stroke={theme.ringStroke} strokeWidth={0.75}/>
      ))}

      {/* Axis spokes */}
      {axes.map((_, i) => {
        const [x, y] = tip(i, R);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y}
          stroke={theme.spoke} strokeWidth={1}/>;
      })}

      {/* Dashed reference ring at 60% */}
      <path d={poly(R * 0.6)}
        fill="none" stroke={theme.refRing}
        strokeWidth={1} strokeDasharray="5,4"/>

      {/* Filled data polygon */}
      <path d={data}
        fill={theme.dataFill}
        stroke={theme.dataStroke} strokeWidth={2}
        strokeLinejoin="round" filter="url(#glow)"/>

      {/* Colored dots */}
      {axes.map((a, i) => {
        const [x, y] = tip(i, a.value * R);
        return <circle key={i} cx={x} cy={y} r={5}
          fill={a.color} stroke="rgba(0,0,0,0.35)" strokeWidth={1}/>;
      })}

      {/* Axis labels */}
      {axes.map((a, i) => {
        const [x, y] = tip(i, R * 1.18);
        const isTop   = a.value === maxV && a.value > 0;
        return (
          <text key={i} x={x} y={y}
            textAnchor="middle" dominantBaseline="middle"
            fill={isTop ? a.color : theme.labelDim}
            fontSize={isTop ? 13 : 11.5}
            fontWeight={isTop ? 700 : 400}
            fontFamily="Inter,system-ui,sans-serif">
            {a.label}
          </text>
        );
      })}

      {/* Center circle */}
      <circle cx={cx} cy={cy} r={R * 0.265}
        fill="url(#rCg)" stroke={theme.centerStroke} strokeWidth={1}/>
      <text x={cx} y={cy - 12} textAnchor="middle"
        fill={theme.centerLabelSub} fontSize={9.5}
        letterSpacing="0.1em" fontFamily="Inter,system-ui,sans-serif">PROFIL</text>
      <text x={cx} y={cy + 9} textAnchor="middle"
        fill={theme.centerLabelMain} fontSize={14} fontWeight={700}
        fontFamily="Inter,system-ui,sans-serif">{profileName}</text>
    </svg>
  );
};

// ── StudyRadar: liest C.dark und wählt automatisch das richtige Theme ──
const StudyRadar = ({ completed }) => {
  const C = useT();  // ← hier kommt dark/light rein

  const axisData = getRadarAxes(C).map(ax => {
    const maxEcts    = ax.ids.reduce((s,id) => s + (COURSES.find(c=>c.id===id)?.ects||0), 0) || 1;
    const earnedEcts = ax.ids.reduce((s,id) => {
      if (!completed.find(x=>x.id===id)) return s;
      return s + (COURSES.find(c=>c.id===id)?.ects||0);
    }, 0);
    return { label:ax.label, value:Math.min(1, earnedEcts / maxEcts), color: ax.color || C.red };
  });

  const allZero    = axisData.every(a => a.value === 0);
  const topAxis    = axisData.reduce((a,b) => a.value > b.value ? a : b);
  const isBalanced = !allZero && axisData.filter(a => a.value > 0.25).length >= 4;
  let profileName  = 'Kein Profil';
  if (!allZero) {
    const match = PROFILES.find(p => p.axis === topAxis.label);
    profileName  = isBalanced ? 'Balanced' : (match?.label || topAxis.label);
  }

  // ← Das ist der entscheidende Punkt: C.dark wählt das passende Theme
  const chartTheme = C.dark ? radarDarkTheme : radarLightTheme;

  return (
    <div style={{
      background:    C.card,
      borderRadius:  10,
      padding:       '22px 24px',
      border:        `1px solid ${C.border}`,        // ← C.border passt sich an
      marginBottom:  18,
      display:       'flex',
      flexDirection: 'column',
      alignItems:    'center',
    }}>
      <div style={{ fontSize:14, fontWeight:600, color:C.text, marginBottom:4, alignSelf:'flex-start' }}>
        Studienprofil
      </div>
      <div style={{ fontSize:12, color:C.textMuted, marginBottom:16, alignSelf:'flex-start' }}>
        Visualisierung deiner Schwerpunkte nach absolvierten Kursen
      </div>
      <RadarChart axes={axisData} size={420} profileName={profileName} theme={chartTheme}/>
    </div>
  );
};

// ─── COURSE CATALOG ──────────────────────────────────────────────
const WEEKDAYS  = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag'];
const TYPE_OPTS = ['Vorlesung','Übung','Praktikum','Seminar'];
const CAT_OPTS  = ['TECH','THEO','PRAK','INFO','FOKUS','BASIS'];

const CourseCatalog = ({ onSelect, completedIds, favorites, toggleFav, selectedId, narrow }) => {
  const C = useT();
  const [search, setSearch] = useState('');
  const [fDays,  setFDays]  = useState([]);
  const [fTypes, setFTypes] = useState([]);
  const [fCats,  setFCats]  = useState([]);
  const [filtersOpen, setFiltersOpen] = useState(false);

  const filtered = useMemo(() => COURSES.filter(c => {
    const q=search.toLowerCase();
    return (!q || c.title.toLowerCase().includes(q)||c.titleDE.toLowerCase().includes(q)||c.lecturer.toLowerCase().includes(q)||c.number.toLowerCase().includes(q))
      && (fDays.length===0  || fDays.some(d=>c.weekdays.includes(d)))
      && (fTypes.length===0 || fTypes.some(t=>c.type.includes(t)))
      && (fCats.length===0  || fCats.some(cat=>c.masterCats.includes(cat)));
  }), [search, fDays, fTypes, fCats]);

  const toggle=(arr,set,v)=>set(arr.includes(v)?arr.filter(x=>x!==v):[...arr,v]);
  const nF=fDays.length+fTypes.length+fCats.length;
  const cols = narrow ? '1fr' : '1fr 1fr';

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <div style={{ padding:'24px 32px 0', flexShrink:0 }}>
        <h1 style={{ fontFamily:"'Source Serif 4',Georgia,serif", fontSize:24, fontWeight:600, color:C.text, marginBottom:16, letterSpacing:'-0.02em' }}>Kurskatalog</h1>
        <div style={{ display:'flex', gap:10, alignItems:'center', marginBottom:16, flexWrap:'wrap' }}>
          <div style={{ position:'relative', flex:1, maxWidth:440, minWidth:200 }}>
            <span style={{ position:'absolute', left:11, top:'50%', transform:'translateY(-50%)', pointerEvents:'none' }}>
              <Icon name="search" size={15} color={C.textMuted}/>
            </span>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="Kurs, Dozent oder Nummer suchen …"
              style={{ width:'100%', padding:'9px 12px 9px 34px', border:`1px solid ${C.border}`, borderRadius:8, fontSize:13.5, background:C.card, color:C.text, outline:'none', transition:'border-color 0.15s, box-shadow 0.15s' }}
              onFocus={e=>{e.target.style.borderColor=C.red+'80';e.target.style.boxShadow=`0 0 0 3px ${C.red}25`;}}
              onBlur={e=>{e.target.style.borderColor=C.border;e.target.style.boxShadow='none';}}/>
          </div>
          <button onClick={()=>setFiltersOpen(!filtersOpen)} style={{
            display:'flex', alignItems:'center', gap:6, padding:'8px 14px',
            background: nF>0 ? C.red : C.card,
            color: nF>0 ? '#FFF' : C.textMid,
            border:`1px solid ${nF>0 ? C.red : C.border}`,
            borderRadius:8, fontSize:13, fontWeight:500, transition:'all 0.15s',
          }}>
            <Icon name="filter" size={14} color={nF>0?'#FFF':C.textMid}/>
            Filter {nF>0?`(${nF})`:''}
          </button>
          <span style={{ fontSize:12.5, color:C.textMuted, padding:'0 4px' }}>{filtered.length} Veranstaltungen</span>
        </div>
        {filtersOpen && (
          <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:'16px 18px', marginBottom:14, display:'flex', gap:28, flexWrap:'wrap', alignItems:'flex-end' }}>
            <FGroup label="Wochentag" opts={WEEKDAYS}  active={fDays}  onToggle={v=>toggle(fDays,setFDays,v)}/>
            <FGroup label="Typ"       opts={TYPE_OPTS} active={fTypes} onToggle={v=>toggle(fTypes,setFTypes,v)}/>
            <FGroup label="Kategorie" opts={CAT_OPTS}  active={fCats}  onToggle={v=>toggle(fCats,setFCats,v)} useColors/>
            {nF>0&&<button onClick={()=>{setFDays([]);setFTypes([]);setFCats([]);}} style={{ background:'none', border:'none', color:C.red, fontSize:12, fontWeight:600, textDecoration:'underline', textUnderlineOffset:2 }}>Zurücksetzen</button>}
          </div>
        )}
      </div>
      <div style={{ flex:1, overflowY:'auto', padding:'0 32px 32px' }}>
        <div style={{ display:'grid', gridTemplateColumns:cols, gap:14 }}>
          {filtered.map(c=>(
            <CourseCard key={c.id} course={c} done={completedIds.includes(c.id)} fav={favorites.includes(c.id)} toggleFav={()=>toggleFav(c.id)} onClick={()=>onSelect(c)} active={selectedId===c.id}/>
          ))}
        </div>
        {filtered.length===0&&(
          <div style={{ textAlign:'center', padding:'80px 0', color:C.textMuted }}>
            <div style={{ fontSize:32, marginBottom:10, opacity:0.2 }}>◌</div>
            <div style={{ fontSize:14 }}>Keine Kurse gefunden.</div>
          </div>
        )}
      </div>
    </div>
  );
};

    <div onClick={onClick}

      style={{ background:hov||active?C.cardHover:C.card, border:`1px solid ${borderCol}`, borderRadius:10, padding:'16px 18px', cursor:'pointer', transition:'all 0.15s', boxShadow:hov?'0 4px 14px rgba(0,0,0,0.06)':'0 1px 2px rgba(0,0,0,0.03)', display:'flex', flexDirection:'column', gap:12 }}>

          {c.masterCats.map(cat=><CatBadge key={cat} cat={cat} small/>)}
        </div>
        <FavStar active={fav} onClick={toggleFav}/>

      <div>
        <div style={{ fontSize:15.5, fontWeight:600, color:C.text, lineHeight:1.25, marginBottom:2 }}>{c.title}</div>
        <div style={{ fontSize:12, color:C.textMuted }}>{c.titleDE} · {c.number}</div>
      </div>

      <div style={{ display:'flex', flexDirection:'column', gap:6, paddingTop:4, borderTop:`1px solid ${C.borderLight}`, minWidth:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, fontSize:12.5, color:C.textMid, minWidth:0 }}>
          <Icon name="user" size={14} color={C.textMuted}/>
          <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', minWidth:0, flex:1 }}>{c.lecturer.replace(/Prof\. Dr\. |Prof\. |Dr\. /g,'')}</span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8, fontSize:12.5, color:C.textMid, minWidth:0 }}>
          <Icon name="clock" size={14} color={C.textMuted}/>
          <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', minWidth:0, flex:1 }}>{slot.day}, {slot.time}</span>

        <div style={{ display:'flex', alignItems:'center', gap:8, fontSize:12.5, color:C.textMid, minWidth:0 }}>
          <Icon name="pin" size={14} color={C.textMuted}/>
          <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', minWidth:0, flex:1 }}>{slot.room}</span>
        </div>
      </div>

      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', paddingTop:6, borderTop:`1px solid ${C.borderLight}` }}>
        <span style={{ fontSize:13, fontWeight:700, color:C.text }}>{c.ects} <span style={{ fontSize:11, fontWeight:400, color:C.textMuted }}>ECTS</span></span>
        {done && <span style={{ fontSize:10.5, color:C.dark?'#5dd880':'#1e7b3a', fontWeight:600, background:C.dark?'#0f2e1a':'#e8f5ec', borderRadius:20, padding:'2px 8px', border:`1px solid ${C.dark?'#2d6b3f':'#86c99a'}` }}>✓ Absolviert</span>}
      </div>
    </div>
  );
};

const FGroup = ({ label, opts, active, onToggle, useColors }) => {
  const C = useT();
  return (
    <div>
      <div style={{ fontSize:10, fontWeight:600, letterSpacing:'0.08em', textTransform:'uppercase', color:C.textMuted, marginBottom:7 }}>{label}</div>
      <div style={{ display:'flex', gap:5, flexWrap:'wrap' }}>
        {opts.map(o=>{
          const col = useColors ? C.cat[o] : null;
          const bg  = useColors ? C.catBg[o] : null;
          const on  = active.includes(o);
          return (
            <button key={o} onClick={()=>onToggle(o)} style={{
              padding:'4px 10px', borderRadius:20, fontSize:12, fontWeight:500,
              background: on ? (col||C.red) : (bg||'transparent'),
              color: on ? '#FFF' : (col||C.textMid),
              border:`1px solid ${on?(col||C.red):C.border}`,
              transition:'all 0.1s',
            }}>{o}</button>
          );
        })}
      </div>
    </div>
  );
};

  const C = useT();
  return (
    <div style={{ border:`1px solid lightgrey`, borderRadius:14, padding: compact?'18px':'24px', marginBottom: compact?20:24, position:'relative' }}>
      <div style={{ position:'absolute', top:14, right:14 }}><FavStar active={fav} onClick={toggleFav} size={compact?20:22}/></div>
      <div style={{ display:'flex', gap:6, marginBottom:12, flexWrap:'wrap' }}>
        {c.masterCats.map(cat=><CatBadge key={cat} cat={cat}/>)}
        <TypePill type={c.type}/>
      </div>
      <h1 style={{ fontFamily:"'Source Serif 4',Georgia,serif", fontSize: compact?20:26, fontWeight:600, color:C.text, lineHeight:1.15, marginBottom:5, letterSpacing:'-0.02em', paddingRight:36 }}>{c.title}</h1>
      <div style={{ fontSize: compact?13:15, color:C.textMuted, marginBottom: comp?14:0 }}>{c.titleDE}</div>
      {comp&&(
        <div style={{ display:'inline-flex', alignItems:'center', gap:7, background:C.card, border:`1px solid ${C.border}`, borderRadius:8, padding:'7px 12px', fontSize:13 }}>
          <Icon name="check" size={14} color={C.text}/>
          <span style={{ color:C.text, fontWeight:600 }}>Absolviert</span>
          <span style={{ color:C.textMid }}>Note {comp.grade} · {comp.semester}</span>
        </div>
      )}
    </div>
  );
};

const DetailMeta = ({ c }) => {
  const C = useT();
  return (
    <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, overflow:'hidden' }}>
      <div style={{ padding:'14px 18px', borderBottom:`1px solid ${C.border}`, fontSize:12, fontWeight:600, color:C.textMid }}>Kursdetails</div>
      {[['Kursnummer',c.number],['Dozent/in',c.lecturer],['Raum',c.room],[`ECTS`,`${c.ects} Creditpoints`],['SWS',`${c.sws} SWS`],['Sprache',c.language],['Turnus',c.frequency],['Modul',c.module]].map(([k,v])=>(
        <div key={k} style={{ padding:'11px 18px', borderBottom:`1px solid ${C.borderLight}`, display:'grid', gridTemplateColumns:'80px 1fr', gap:8 }}>
          <span style={{ fontSize:11, fontWeight:500, color:C.textMuted, paddingTop:1, lineHeight:1.4 }}>{k}</span>
          <span style={{ fontSize:13, color:C.text, lineHeight:1.4 }}>{v}</span>
        </div>
      ))}
    </div>
  );
};

const DetailBlock = ({ title, children }) => {
  const C = useT();
  return (
    <div style={{ marginBottom:24 }}>
      <div style={{ fontSize:11, fontWeight:600, letterSpacing:'0.07em', textTransform:'uppercase', color:C.textMuted, marginBottom:12, paddingBottom:8, borderBottom:`1px solid ${C.borderLight}` }}>{title}</div>
      {children}
    </div>
  );
};

// ─── TOR UPLOAD ──────────────────────────────────────────────────
const TorUpload = ({ completed, setCompleted }) => {
  const C = useT();
  const [dragging,setDragging]=useState(false);
  const [fileName,setFileName]=useState(null);
  const [parsing,setParsing]=useState(false);
  const [catEdits,setCatEdits]=useState({});
  const ref=useRef();
  const ALL_CATS=['TECH','THEO','PRAK','INFO','FOKUS','BASIS'];
  const getCats=id=>catEdits[id]||COURSES.find(c=>c.id===id)?.masterCats||[];
  const toggleCat=(id,cat)=>{
    const cur=getCats(id);
    setCatEdits(prev=>({...prev,[id]:cur.includes(cat)?cur.filter(x=>x!==cat):[...cur,cat]}));
  };
  const handle=file=>{
    if(!file) return;
    setParsing(true); setFileName(file.name);
    setTimeout(()=>{
      setParsing(false);
      setCompleted([
        {id:'INF4220',grade:1.7,semester:'WS 2025/26'},{id:'INF4310',grade:2.3,semester:'WS 2025/26'},
        {id:'INF4601',grade:1.3,semester:'WS 2025/26'},{id:'INF4810',grade:2.0,semester:'WS 2025/26'},
        {id:'INF4952',grade:2.7,semester:'SS 2025'},{id:'INF4700',grade:1.7,semester:'SS 2025'},
        {id:'INF4010',grade:1.0,semester:'WS 2024/25'},{id:'INF4020',grade:2.3,semester:'WS 2024/25'},
      ]);
    },1600);
  };
  const done=COURSES.filter(c=>completed.some(x=>x.id===c.id));
  const totalEcts=done.reduce((s,c)=>s+c.ects,0);
  const grades=completed.map(x=>x.grade);
  const avg=grades.length>0?(grades.reduce((a,b)=>a+b,0)/grades.length).toFixed(2):null;
  return (
    <div style={{ flex:1, overflowY:'auto', padding:'32px 36px' }}>
      <div style={{ maxWidth:1200 }}>
        <h1 style={{ fontFamily:"'Source Serif 4',Georgia,serif", fontSize:24, fontWeight:600, color:C.text, marginBottom:6, letterSpacing:'-0.02em' }}>Notenblatt hochladen</h1>
        <p style={{ fontSize:13.5, color:C.textMuted, marginBottom:28 }}>Laden Sie Ihr Transcript of Records hoch — StudyOS erkennt automatisch Ihre Kurse und Noten.</p>
        <div style={{ display:'flex', gap:32, alignItems:'flex-start' }}>
          <div style={{ flex:1 }}>
            <div onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)}
              onDrop={e=>{e.preventDefault();setDragging(false);handle(e.dataTransfer.files[0]);}}
              onClick={()=>ref.current.click()}
              style={{ border:`2px dashed ${dragging?C.red:C.border}`, borderRadius:14, padding:'48px 32px', textAlign:'center', cursor:'pointer', background:dragging?C.redLight:C.card, transition:'all 0.2s' }}>
              <input ref={ref} type="file" accept=".pdf,.csv,.xlsx" style={{ display:'none' }} onChange={e=>handle(e.target.files[0])}/>
              {parsing?(
                <div>
                  <div style={{ fontSize:24, marginBottom:12, color:C.textMuted, letterSpacing:6 }}>· · ·</div>
                  <div style={{ fontSize:14, color:C.textMid, fontWeight:500 }}>Notenblatt wird verarbeitet …</div>
                </div>
              ):fileName?(
                <div>
                  <div style={{ width:48,height:48,background:C.borderLight,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px' }}>
                    <Icon name="check" size={22} color={C.text}/>
                  </div>
                  <div style={{ fontSize:14, fontWeight:600, color:C.text, marginBottom:4 }}>{fileName}</div>
                  <div style={{ fontSize:12.5, color:C.textMuted }}>Erfolgreich importiert · Klicken zum Ersetzen</div>
                </div>
              ):(
                <div>
                  <div style={{ width:52,height:52,background:C.borderLight,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px' }}>
                    <Icon name="upload" size={22} color={C.textMuted}/>
                  </div>
                  <div style={{ fontSize:15, fontWeight:600, color:C.text, marginBottom:5 }}>PDF hierher ziehen</div>
                  <div style={{ fontSize:13, color:C.textMuted }}>oder klicken · PDF, CSV, XLSX</div>
                </div>
              )}
            </div>
          </div>
          {done.length>0&&(
            <div style={{ flex:1 }}>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12, marginBottom:20 }}>
                {[['Fortschritt',`${Math.round(totalEcts/120*100)} %`],['ECTS erworben',`${totalEcts} / 120`],['Ø Note',avg||'–']].map(([l,v])=>(
                  <div key={l} style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:'14px 18px' }}>
                    <div style={{ fontSize:11, fontWeight:500, color:C.textMuted, marginBottom:6, textTransform:'uppercase', letterSpacing:'0.06em' }}>{l}</div>
                    <div style={{ fontSize:24, fontWeight:700, color:C.accent }}>{v}</div>
                  </div>
                ))}
              </div>
              <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, overflow:'hidden' }}>
                <div style={{ padding:'14px 20px', borderBottom:`1px solid ${C.border}`, fontSize:12, fontWeight:600, color:C.textMid }}>Importierte Kurse</div>
                {done.map((c,i)=>{
                  const comp=completed.find(x=>x.id===c.id);
                  const cats=getCats(c.id);
                  return (
                    <div key={c.id} style={{ padding:'12px 20px', borderBottom:i<done.length-1?`1px solid ${C.borderLight}`:'none', background:i%2===0?C.card:C.rowAlt }}>
                      <div style={{ display:'flex', alignItems:'center', gap:14 }}>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:13.5, fontWeight:500, color:C.text }}>{c.title}</div>
                          <div style={{ fontSize:11.5, color:C.textMuted, marginBottom:7 }}>{comp.semester} · {c.ects} ECTS</div>
                          <div style={{ display:'flex', gap:4, flexWrap:'wrap' }}>
                            {ALL_CATS.map(cat=>{
                              const on=cats.includes(cat);
                              return (
                                <button key={cat} onClick={()=>toggleCat(c.id,cat)} style={{
                                  padding:'2px 8px', borderRadius:4, fontSize:10.5, fontWeight:600,
                                  background:on?hexToRgba(C.cat[cat], 0.2):C.bg,
                                  color:on?C.cat[cat]:C.textMuted,
                                  border:`1px solid ${on?C.cat[cat]:C.border}`,
                                  transition:'all 0.1s', cursor:'pointer',
                                }}>{cat}</button>
                              );
                            })}
                          </div>
                        </div>
                        <span style={{ fontWeight:700, fontSize:17, color:C.text, flexShrink:0 }}>{comp.grade}</span>
                        <button onClick={()=>setCompleted(completed.filter(x=>x.id!==c.id))} style={{ background:'none', border:'none', color:C.textMuted, fontSize:18, padding:'0 4px', lineHeight:1 }}>×</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ─── APP ─────────────────────────────────────────────────────────
const App = () => {
  const [page,      setPage]      = useState('dashboard');
  const [selected,  setSelected]  = useState(null);
  const [completed, setCompleted] = useState(COMPLETED_INIT);
  const [favorites, setFavorites] = useState(['INF4220','INF4450','INF4700']);
  const [dark,      setDark]      = useState(false);

  const [tweaks, setTweak] = useTweaks(/*EDITMODE-BEGIN*/{
    "topMenu": true
  }/*EDITMODE-END*/);

  useEffect(() => { document.body.setAttribute('data-dark', dark?'1':'0'); }, [dark]);

  const theme = dark ? darkTheme : lightTheme;
  useEffect(() => {
    document.body.style.background = theme.bg;
    document.body.style.color = theme.text;
  }, [theme]);

  const navTo = p => { setPage(p); setSelected(null); };
  const compIds = completed.map(x=>x.id);
  const toggleFav = id => setFavorites(favs => favs.includes(id) ? favs.filter(x=>x!==id) : [...favs, id]);

  const inCatalogList = page==='catalog' || page==='favorites';
  const useDrawer = tweaks.topMenu;

  let mainContent;
  if (page==='dashboard') {
    mainContent = <Dashboard completed={completed} setPage={navTo}/>;
  } else if (page==='tor') {
    mainContent = <TorUpload completed={completed} setCompleted={setCompleted}/>;
  } else if (inCatalogList) {
    if (useDrawer) {
      // List always shown, drawer slides over right side
      mainContent = (
        <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
          <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
            {page==='catalog'
              ? <CourseCatalog onSelect={setSelected} completedIds={compIds} favorites={favorites} toggleFav={toggleFav} selectedId={selected?.id} narrow={!!selected}/>
              : <Favorites favorites={favorites} toggleFav={toggleFav} onSelect={setSelected} completedIds={compIds} setPage={navTo} selectedId={selected?.id} narrow={!!selected}/>}
          </div>
          {selected && <CourseDetailDrawer course={selected} onClose={()=>setSelected(null)} completedList={completed} fav={favorites.includes(selected.id)} toggleFav={()=>toggleFav(selected.id)}/>}
        </div>
      );
    } else {
      // Sidebar mode: full-page detail replaces list
      if (selected) {
        mainContent = <CourseDetail course={selected} onBack={()=>setSelected(null)} completedList={completed} fav={favorites.includes(selected.id)} toggleFav={()=>toggleFav(selected.id)}/>;
      } else {
        mainContent = page==='catalog'
          ? <CourseCatalog onSelect={setSelected} completedIds={compIds} favorites={favorites} toggleFav={toggleFav}/>
          : <Favorites favorites={favorites} toggleFav={toggleFav} onSelect={setSelected} completedIds={compIds} setPage={navTo}/>;
      }
    }
  }

  return (
    <ThemeCtx.Provider value={theme}>
      <div style={{ height:'100vh', display:'flex', flexDirection: tweaks.topMenu ? 'column' : 'row', overflow:'hidden', background:theme.bg, color:theme.text }}>
        {tweaks.topMenu
          ? <><TopMenu page={page} setPage={navTo} dark={dark} setDark={setDark}/><main style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column', background:theme.bg }}>{mainContent}</main></>
          : <><Sidebar page={page} setPage={navTo} dark={dark} setDark={setDark}/><main style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column', background:theme.bg }}>{mainContent}</main></>
        }
        <TweaksPanel title="Tweaks">
          <TweakToggle label="Menü oben statt links" value={tweaks.topMenu} onChange={v=>setTweak('topMenu',v)}/>
          <TweakToggle label="Dunkelmodus" value={dark} onChange={setDark}/>
        </TweaksPanel>
      </div>
    </ThemeCtx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
